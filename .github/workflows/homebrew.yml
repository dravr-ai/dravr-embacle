name: Homebrew

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-server-install:
    name: Test brew install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install from tap
        run: |
          brew tap dravr-ai/tap
          brew install embacle

      - name: Verify binaries exist
        run: |
          embacle-server --version
          embacle-mcp --version

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SERVER_VERSION=$(embacle-server --version | awk '{print $2}')
          MCP_VERSION=$(embacle-mcp --version | awk '{print $2}')
          echo "Tag: ${TAG}, Server: ${SERVER_VERSION}, MCP: ${MCP_VERSION}"
          [ "$SERVER_VERSION" = "$TAG" ] || { echo "Server version mismatch"; exit 1; }
          [ "$MCP_VERSION" = "$TAG" ] || { echo "MCP version mismatch"; exit 1; }

      - name: Smoke test — server starts and serves health endpoint
        run: |
          embacle-server --provider copilot --port 9876 &
          SERVER_PID=$!

          # Wait for the server to be ready (up to 10 seconds)
          for i in $(seq 1 20); do
            if curl -sf http://localhost:9876/health >/dev/null 2>&1; then
              echo "Server is up after $((i / 2))s"
              break
            fi
            sleep 0.5
          done

          # Verify health endpoint returns JSON with providers
          HEALTH=$(curl -sf http://localhost:9876/health)
          echo "Health response: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"providers"' || { echo "Health missing providers"; kill $SERVER_PID; exit 1; }

          # Verify models endpoint
          MODELS=$(curl -sf http://localhost:9876/v1/models)
          echo "Models response: ${MODELS}"
          echo "${MODELS}" | grep -q '"data"' || { echo "Models missing data"; kill $SERVER_PID; exit 1; }

          kill $SERVER_PID
          echo "Server smoke test passed"

  test-ffi-install:
    name: Test FFI install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and install FFI
        run: ./scripts/install-ffi.sh

      - name: Verify library installed
        run: |
          test -f /usr/local/lib/libembacle.a || { echo "libembacle.a not found"; exit 1; }
          test -f /usr/local/include/embacle.h || { echo "embacle.h not found"; exit 1; }

      - name: Verify FFI symbols exported
        run: |
          nm /usr/local/lib/libembacle.a | grep -q "T.*embacle_init" || { echo "embacle_init not found"; exit 1; }
          nm /usr/local/lib/libembacle.a | grep -q "T.*embacle_chat_completion" || { echo "embacle_chat_completion not found"; exit 1; }
          nm /usr/local/lib/libembacle.a | grep -q "T.*embacle_free_string" || { echo "embacle_free_string not found"; exit 1; }
          nm /usr/local/lib/libembacle.a | grep -q "T.*embacle_shutdown" || { echo "embacle_shutdown not found"; exit 1; }
          echo "All 4 FFI symbols verified"

      - name: Verify C header compiles
        run: |
          cat > /tmp/test_embacle.c <<'EOF'
          #include "embacle.h"
          int main(void) {
              embacle_init();
              embacle_shutdown();
              return 0;
          }
          EOF
          cc -c -I/usr/local/include /tmp/test_embacle.c -o /tmp/test_embacle.o
          echo "C header compiles successfully"
          rm -f /tmp/test_embacle.c /tmp/test_embacle.o

      - name: Test uninstall
        run: |
          ./scripts/install-ffi.sh --uninstall
          test ! -f /usr/local/lib/libembacle.a || { echo "libembacle.a still present after uninstall"; exit 1; }
          test ! -f /usr/local/include/embacle.h || { echo "embacle.h still present after uninstall"; exit 1; }
          echo "Uninstall verified"
