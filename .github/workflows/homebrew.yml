name: Homebrew

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-server-install:
    name: Test brew install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # GitHub's ubuntu runners ship Homebrew at /home/linuxbrew/.linuxbrew but
      # do not put it on PATH in non-login shells, so `brew` is not found.
      # macOS runners already have brew on PATH.
      - name: Set up Homebrew on PATH (Linux)
        if: runner.os == 'Linux'
        run: |
          test -x /home/linuxbrew/.linuxbrew/bin/brew || { echo "linuxbrew not found on runner"; exit 1; }
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Install from tap
        run: |
          brew tap dravr-ai/tap
          # Homebrew 6.0 added "tap trust": third-party formulae must be
          # explicitly trusted before install. `brew trust` is the documented,
          # non-interactive CI path; it is absent on older brew (< 6.0), which
          # needs no trust, so tolerate that with `|| true`. (Preferred over the
          # HOMEBREW_NO_REQUIRE_TAP_TRUST bypass, which Homebrew will remove.)
          brew trust dravr-ai/tap || true
          brew install embacle

      - name: Verify binaries exist
        run: |
          embacle-server --version
          embacle-mcp --version

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SERVER_VERSION=$(embacle-server --version | awk '{print $2}')
          MCP_VERSION=$(embacle-mcp --version | awk '{print $2}')
          echo "Tag: ${TAG}, Server: ${SERVER_VERSION}, MCP: ${MCP_VERSION}"
          [ "$SERVER_VERSION" = "$TAG" ] || { echo "Server version mismatch"; exit 1; }
          [ "$MCP_VERSION" = "$TAG" ] || { echo "MCP version mismatch"; exit 1; }

      - name: Smoke test — server starts and serves health endpoint
        run: |
          embacle-server --provider copilot --port 9876 &
          SERVER_PID=$!

          # Wait for the HTTP server to accept connections (up to 10 seconds).
          # In CI no provider CLI is installed, so /health returns 503
          # (degraded) — use curl WITHOUT -f so any HTTP response counts as
          # "up"; -f would treat the expected 503 as a connection failure.
          for i in $(seq 1 20); do
            if curl -s -o /dev/null http://localhost:9876/health; then
              echo "Server is up after $((i / 2))s"
              break
            fi
            sleep 0.5
          done

          # /health: accept the degraded 503 (no provider creds in CI) — this is
          # a smoke test that the binary boots and serves, not that a provider is
          # authenticated. Just verify the handler returns JSON with a providers
          # field. (-f omitted so the 503 body is still captured.)
          HEALTH=$(curl -s http://localhost:9876/health)
          echo "Health response: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"providers"' || { echo "Health missing providers"; kill $SERVER_PID; exit 1; }

          # /v1/models always returns 200 with a data array (empty when no
          # provider CLI is present), so -f is correct here.
          MODELS=$(curl -sf http://localhost:9876/v1/models)
          echo "Models response: ${MODELS}"
          echo "${MODELS}" | grep -q '"data"' || { echo "Models missing data"; kill $SERVER_PID; exit 1; }

          kill $SERVER_PID
          echo "Server smoke test passed"

  test-ffi-install:
    name: Test FFI install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # llvm-tools provides llvm-nm, used below to read the static archive —
      # macOS's system nm (Xcode) cannot parse Rust 1.96's LLVM object files.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2

      # /usr/local/lib is not writable without sudo on GitHub's ubuntu runners,
      # and on arm macOS it does not exist (Homebrew lives in /opt/homebrew), so
      # the default install path made every FFI run fail at the install step.
      # Install to a user-writable prefix instead — running the whole script
      # under sudo is not an option because root lacks the runner's rustup
      # toolchain. install-ffi.sh honours the PREFIX env var for install+uninstall.
      - name: Set install prefix
        run: echo "PREFIX=$HOME/.local" >> "$GITHUB_ENV"

      - name: Build and install FFI
        run: ./scripts/install-ffi.sh

      - name: Verify library installed
        run: |
          test -f "$PREFIX/lib/libembacle.a" || { echo "libembacle.a not found"; exit 1; }
          test -f "$PREFIX/include/embacle.h" || { echo "embacle.h not found"; exit 1; }

      - name: Verify FFI symbols exported
        run: |
          # Use the toolchain-matched llvm-nm: Apple's system nm cannot read
          # object files produced by Rust 1.96's bundled LLVM ("Unknown
          # attribute kind"). llvm-nm ships in the llvm-tools component under
          # the rustlib bin dir (sibling of the target libdir).
          NM="$(rustc --print target-libdir)/../bin/llvm-nm"
          "$NM" "$PREFIX/lib/libembacle.a" | grep -q "T.*embacle_init" || { echo "embacle_init not found"; exit 1; }
          "$NM" "$PREFIX/lib/libembacle.a" | grep -q "T.*embacle_chat_completion" || { echo "embacle_chat_completion not found"; exit 1; }
          "$NM" "$PREFIX/lib/libembacle.a" | grep -q "T.*embacle_free_string" || { echo "embacle_free_string not found"; exit 1; }
          "$NM" "$PREFIX/lib/libembacle.a" | grep -q "T.*embacle_shutdown" || { echo "embacle_shutdown not found"; exit 1; }
          echo "All 4 FFI symbols verified"

      - name: Verify C header compiles
        run: |
          cat > /tmp/test_embacle.c <<'EOF'
          #include "embacle.h"
          int main(void) {
              embacle_init();
              embacle_shutdown();
              return 0;
          }
          EOF
          cc -c -I"$PREFIX/include" /tmp/test_embacle.c -o /tmp/test_embacle.o
          echo "C header compiles successfully"
          rm -f /tmp/test_embacle.c /tmp/test_embacle.o

      - name: Test uninstall
        run: |
          ./scripts/install-ffi.sh --uninstall
          test ! -f "$PREFIX/lib/libembacle.a" || { echo "libembacle.a still present after uninstall"; exit 1; }
          test ! -f "$PREFIX/include/embacle.h" || { echo "embacle.h still present after uninstall"; exit 1; }
          echo "Uninstall verified"
